name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev libltdl-dev libbz2-dev libsdl2-dev
      - name: Setup Android SDK
        run: |
          SDK_DIR=/home/runner/.buildozer/android/platform/android-sdk
          rm -rf $SDK_DIR
          mkdir -p $SDK_DIR/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip
          mv cmdline-tools $SDK_DIR/cmdline-tools/latest
          mkdir -p $SDK_DIR/licenses
          echo "8933bad61a48aab9c5949a5c6c1a3b3a55ca8af92dbe93b6a497d7" > $SDK_DIR/licenses/android-sdk-license
          echo "24333f8a63b6815a8e0c9dcf3e5b1b4e0e0f4a8e8e1b2c3d4e5f6" > $SDK_DIR/licenses/android-sdk-preview-license || true
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platform-tools" "platforms;android-33" "ndk;25b"
      - name: Build APK
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GestorMasterS.ILMVC-APK
          path: bin/*.apk
