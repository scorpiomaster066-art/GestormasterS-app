name: Build APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33
      - name: Build APK 1st download SDK
        run: |
          yes | buildozer android debug || true
      - name: Accept licenses
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platform-tools" "platforms;android-33" || true
      - name: Build APK final
        run: |
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GestorMasterS-APK
          path: bin/*.apk
